name: Render template previews

# Renders demo output for any template that is new (no demo/<name> yet) or
# whose files changed in the push, then commits the generated demo/<name>
# back into the repository.
on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
  workflow_dispatch:

# Needed so the job can push the regenerated demo/ output back to the repo.
permissions:
  contents: write

# Serialize runs per branch so two pushes can't race on the demo/ commit.
concurrency:
  group: render-previews-${{ github.ref }}
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so we can diff the push range

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install render dependencies
        run: pip install jinja2 pyyaml markdown

      - name: Determine new / changed templates
        id: pick
        env:
          BEFORE: ${{ github.event.before }}
          AFTER:  ${{ github.sha }}
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/targets.txt"
          : > "$out"

          # 1) Templates whose files changed in this push (needs a valid base SHA;
          #    absent on a branch's first push or on workflow_dispatch).
          base=""
          if [ -n "${BEFORE:-}" ] \
             && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
             && git rev-parse -q --verify "$BEFORE^{commit}" >/dev/null; then
            base="$BEFORE"
          fi
          if [ -n "$base" ]; then
            git diff --name-only "$base" "$AFTER" -- templates/ \
              | awk -F/ 'NF>=2 && $2!="" {print $2}' >> "$out"
          fi

          # 2) Templates that have no demo/ output yet (brand-new directories).
          for d in templates/*/; do
            [ -f "${d}template.yaml" ] || continue
            name="$(basename "$d")"
            [ -d "demo/$name" ] || echo "$name" >> "$out"
          done

          # De-dup, drop blanks, and keep only templates that still exist
          # (a deletion shows up in the diff but must not be rendered).
          : > "$out.final"
          sort -u "$out" | sed '/^$/d' | while IFS= read -r n; do
            [ -f "templates/$n/template.yaml" ] && echo "$n" >> "$out.final"
          done
          mv "$out.final" "$out"

          if [ -s "$out" ]; then
            echo "has=true" >> "$GITHUB_OUTPUT"
            echo "Templates to render:"; cat "$out"
          else
            echo "has=false" >> "$GITHUB_OUTPUT"
            echo "No new or changed templates."
          fi

      - name: Render previews
        if: steps.pick.outputs.has == 'true'
        run: |
          set -uo pipefail        # no -e: one bad template must not skip the rest
          fail=0
          while IFS= read -r name; do
            [ -n "$name" ] || continue
            echo "::group::preview.sh $name"
            if bash preview.sh "$name"; then
              echo "✓ rendered $name"
            else
              echo "::error::preview.sh failed for '$name'"
              fail=1
            fi
            echo "::endgroup::"
          done < "$RUNNER_TEMP/targets.txt"
          echo "RENDER_FAIL=$fail" >> "$GITHUB_ENV"

      - name: Commit rendered demo output
        if: steps.pick.outputs.has == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only the demo dirs we actually rendered.
          while IFS= read -r name; do
            [ -n "$name" ] || continue
            [ -d "demo/$name" ] && git add "demo/$name"
          done < "$RUNNER_TEMP/targets.txt"

          if git diff --cached --quiet; then
            echo "No demo changes to commit."
          else
            git commit -m "chore: render demo previews [skip ci]"
            # Reconcile with any concurrent push, then push back to this branch.
            git pull --rebase --autostash origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi

      - name: Fail if any template failed to render
        if: steps.pick.outputs.has == 'true' && env.RENDER_FAIL == '1'
        run: |
          echo "One or more templates failed to render (see grouped logs above)."
          exit 1
